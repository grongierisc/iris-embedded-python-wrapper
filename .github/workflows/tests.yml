name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [test workflow]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - latest-em
          - latest-cd
          - latest-preview
    steps:
      - uses: actions/checkout@v4

      - name: Start IRIS
        run: |
          docker run -d \
            --name iris \
            -e ISC_CPF_MERGE_FILE=/irisdev/app/merge.cpf \
            -v "$GITHUB_WORKSPACE:/irisdev/app" \
            -p 1972:1972 \
            containers.intersystems.com/intersystems/iris-community:${{ matrix.image }}

      - name: Wait for IRIS
        run: |
          docker exec iris bash -lc 'if [ -x /usr/irissys/dev/Container/waitReady.sh ]; then /usr/irissys/dev/Container/waitReady.sh -m 60; else /usr/irissys/dev/Cloud/ICM/waitReady.sh -m 60; fi'

      - name: Unlock default test passwords
        run: |
          docker exec iris iris session iris -U%SYS '##class(Security.Users).UnExpireUserPasswords("*")'

      - name: Run pytest
        env:
          IRIS_HOST: localhost
          IRIS_PORT: 1972
          IRISNAMESPACE: USER
          IRISUSERNAME: _SYSTEM
          IRISPASSWORD: SYS
          IRIS_E2E_MODES: embedded,remote
          IRIS_REQUIRE_EMBEDDED: 1
          IRIS_REQUIRE_EMBEDDED_SQL: 1
        run: |
          docker exec \
            -e IRIS_HOST=localhost \
            -e IRIS_PORT=1972 \
            -e IRISNAMESPACE=USER \
            -e IRISUSERNAME=_SYSTEM \
            -e IRISPASSWORD=SYS \
            -e IRIS_E2E_MODES=embedded,remote \
            -e IRIS_REQUIRE_EMBEDDED=1 \
            -e IRIS_REQUIRE_EMBEDDED_SQL=1 \
            iris \
            bash -lc 'cd /irisdev/app && ./scripts/run-pytest-in-iris.sh --junit-xml=/tmp/test-results.xml'

      - name: Copy test results
        if: always()
        run: |
          docker cp iris:/tmp/test-results.xml test-results-${{ matrix.image }}.xml || true

      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: test-results-${{ matrix.image }}.xml
          summary: true
          display-options: fEX
          fail-on-empty: false
          title: Test results (${{ matrix.image }})
